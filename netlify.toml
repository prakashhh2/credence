[build]
  command = "npm run build"
  publish = "build"

[context.production.environment]
  # These REACT_APP_* values are intentionally embedded in the client-side bundle by Create React App.
  # The JWT and Pinata keys are used client-side and are expected in build output.
  SECRETS_SCAN_OMIT_KEYS = "REACT_APP_PINATA_API_KEY,REACT_APP_PINATA_API_SECRET,JWT,REACT_APP_ANCHOR_PROGRAM_ID,REACT_APP_SOLANA_RPC_URL"
